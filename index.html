<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campeonato Estadual Paulista de Truco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="intro" class="intro-screen">
    <div class="intro-particles" id="introParticles"></div>
    <div class="intro-card-wrap">
      <div class="intro-card" aria-hidden="true">
        <div class="card-face card-front">
          <span class="card-emblem">A</span>
        </div>
        <div class="card-face card-back">
          <p class="intro-title">CAMPEONATO ESTADUAL PAULISTA DE TRUCO</p>
        </div>
      </div>
    </div>
  </div>

  <main id="app" class="app hidden">
    <header class="hero">
      <p class="hero-kicker">Painel Oficial</p>
      <h1>Campeonato Estadual Paulista de Truco</h1>
    </header>

    <nav class="tabs" aria-label="Navegação principal">
      <button class="tab-btn active" data-tab="participants">Participantes</button>
      <button class="tab-btn" data-tab="score">Pontuação</button>
      <button class="tab-btn" data-tab="draw">Painel de Sorteio</button>
      <button class="tab-btn" data-tab="bracket">Chave do Campeonato</button>
    </nav>

    <section id="participants" class="tab-panel active">
      <div class="card">
        <h2>Cadastro de Jogadores</h2>
        <div class="form-row">
          <input id="playerName" type="text" placeholder="Digite o nome do jogador" maxlength="30" />
          <button id="addPlayerBtn" class="primary-btn">Adicionar Jogador</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="playersTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="score" class="tab-panel">
      <div class="card">
        <h2>Pontuação e Vitórias</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Pontos</th>
                <th>Vitórias</th>
                <th>Controles</th>
              </tr>
            </thead>
            <tbody id="scoreTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="draw" class="tab-panel">
      <div class="card">
        <h2>Sorteio de Duplas</h2>
        <div class="form-row draw-row">
          <button id="drawTeamsBtn" class="primary-btn">Sortear Duplas</button>
          <p class="hint">Necessário no mínimo 8 participantes para montar semifinal e final.</p>
        </div>
        <div id="shuffleAnimation" class="shuffle-animation hidden" aria-live="polite">
          <div class="mini-card"></div>
          <div class="mini-card"></div>
          <div class="mini-card"></div>
        </div>
        <div id="drawResults" class="draw-results"></div>
      </div>
    </section>

    <section id="bracket" class="tab-panel">
      <div class="card">
        <h2>Chave do Campeonato</h2>
        <div id="bracketBoard" class="bracket-board"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
