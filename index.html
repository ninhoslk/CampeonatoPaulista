<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campeonato Estadual Paulista de Truco</title>
  <meta name="description" content="Sistema profissional para gerenciamento do Campeonato Estadual Paulista de Truco — pontuação, sorteio de duplas e chave do campeonato." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══ INTRO ═══ -->
<div id="intro">
  <div class="particles"></div>
  <div class="card-3d-wrapper">
    <div class="card-3d">
      <!-- FRONT -->
      <div class="card-face card-front">
        <div class="glow-overlay"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <span class="card-suit s1">♠</span>
        <span class="card-suit s2">♥</span>
        <span class="card-suit s3">♦</span>
        <span class="card-suit s4">♣</span>
        <h1>CAMPEONATO<br>ESTADUAL<br>PAULISTA<br>DE TRUCO</h1>
        <div class="shine"></div>
      </div>
      <!-- BACK -->
      <div class="card-face card-back">
        <div class="pattern"></div>
        <span class="corner-suit s1">♣</span>
        <span class="corner-suit s2">♣</span>
        <span class="corner-suit s3">♣</span>
        <span class="corner-suit s4">♣</span>
        <div style="text-align:center;z-index:1;position:relative;">
          <div class="zap-symbol">♣</div>
          <div class="zap-label">ZAP</div>
        </div>
      </div>
    </div>
    <div class="card-shadow"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <!-- Title -->
  <div class="main-title">
    <h1>CAMPEONATO ESTADUAL<br>PAULISTA DE TRUCO</h1>
    <div class="suits-row">
      <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="participants">👥 <span class="label">Participantes</span></button>
    <button class="tab-btn" data-tab="scores">🏆 <span class="label">Pontuação</span></button>
    <button class="tab-btn" data-tab="draw">🔀 <span class="label">Sorteio</span></button>
    <button class="tab-btn" data-tab="bracket">📊 <span class="label">Chave</span></button>
  </div>

  <!-- ── Participants ── -->
  <div class="tab-panel active" id="tab-participants">
    <div class="add-form">
      <input type="text" id="player-input" placeholder="Nome do jogador..." />
      <button class="btn btn-neon" onclick="addPlayer()">➕ <span class="label">Adicionar</span></button>
    </div>
    <div class="glass-card participants">
      <div class="table-header"><span>Nome</span><span>Ação</span></div>
      <div id="player-list"></div>
    </div>
    <div class="count-msg" id="player-count"></div>
  </div>

  <!-- ── Scores ── -->
  <div class="tab-panel" id="tab-scores">
    <div class="glass-card scores">
      <div class="table-header">
        <span>Nome</span><span style="text-align:center">Pontos</span><span style="text-align:center">Vitórias</span><span style="text-align:center">Ações</span>
      </div>
      <div id="score-list"></div>
    </div>
  </div>

  <!-- ── Draw ── -->
  <div class="tab-panel" id="tab-draw">
    <div class="draw-center">
      <button class="btn btn-neon btn-lg" id="draw-btn" onclick="drawTeams()">🔀 Sortear Duplas</button>
      <div class="draw-hint" id="draw-hint"></div>
    </div>
    <div class="shuffle-cards" id="shuffle-anim" style="display:none">
      <div class="shuffle-card">♠</div>
      <div class="shuffle-card">♥</div>
      <div class="shuffle-card">♦</div>
      <div class="shuffle-card">♣</div>
    </div>
    <div id="draw-results"></div>
  </div>

  <!-- ── Bracket ── -->
  <div class="tab-panel" id="tab-bracket">
    <div class="bracket-layout">
      <div class="semis">
        <div class="bracket-card" id="bracket-semi1"></div>
        <div class="bracket-card" id="bracket-semi2"></div>
      </div>
      <div class="bracket-connector">
        <div class="connector-line"></div>
        <div class="connector-vert"></div>
        <div class="connector-line"></div>
      </div>
      <div>
        <div class="bracket-card" id="bracket-final"></div>
      </div>
    </div>
    <div class="champion-box" id="champion" style="display:none"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
